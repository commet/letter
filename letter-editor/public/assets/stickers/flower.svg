<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="petal" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fdf6e7"/>
      <stop offset="100%" stop-color="#e8c77d"/>
    </radialGradient>
    <filter id="fShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" in="SourceAlpha"/>
      <feOffset dx="0" dy="2.5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#fShadow)">
    <g>
      <ellipse cx="100" cy="40" rx="28" ry="45" fill="url(#petal)" stroke="#8a6b2f" stroke-width="1.5"/>
      <ellipse cx="100" cy="40" rx="28" ry="45" fill="url(#petal)" stroke="#8a6b2f" stroke-width="1.5" transform="rotate(60 100 100)"/>
      <ellipse cx="100" cy="40" rx="28" ry="45" fill="url(#petal)" stroke="#8a6b2f" stroke-width="1.5" transform="rotate(120 100 100)"/>
      <ellipse cx="100" cy="40" rx="28" ry="45" fill="url(#petal)" stroke="#8a6b2f" stroke-width="1.5" transform="rotate(180 100 100)"/>
      <ellipse cx="100" cy="40" rx="28" ry="45" fill="url(#petal)" stroke="#8a6b2f" stroke-width="1.5" transform="rotate(240 100 100)"/>
      <ellipse cx="100" cy="40" rx="28" ry="45" fill="url(#petal)" stroke="#8a6b2f" stroke-width="1.5" transform="rotate(300 100 100)"/>
    </g>
    <circle cx="100" cy="100" r="22" fill="#b88838" stroke="#6a4a1a" stroke-width="2"/>
    <circle cx="94" cy="94" r="6" fill="#e8c77d" opacity="0.7"/>
  </g>
</svg>

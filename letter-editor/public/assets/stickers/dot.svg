<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="dotFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fdf6e7" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#e8d5a8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#c8a568" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="dotBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="dotShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" in="SourceAlpha"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#dotFill)" filter="url(#dotBlur)"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#b89858" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.55"/>
</svg>
